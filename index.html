<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Todoリスト</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f0ebf8;
font-family:'Roboto',sans-serif;
font-size:16px;
}

.container{
max-width:640px;
margin:0 auto;
padding:12px;
}

.title-card{
background:white;
border-top:8px solid #673ab7;
border-radius:8px;
padding:16px;
margin-bottom:8px;
}

.card{
background:white;
border-radius:8px;
padding:16px;
margin-bottom:8px;
}

textarea{
width:100%;
font-size:16px;
border:none;
border-bottom:1px solid #dadce0;
resize:none;
overflow:hidden;
min-height:48px;
}

.filter-select,
.category-select{
margin-top:8px;
font-size:16px;
height:40px;
width:100%;
}

button{
height:44px;
padding:0 18px;
font-size:16px;
border-radius:6px;
border:none;
margin-top:8px;
}

.btn-primary{background:#673ab7;color:white;}
.btn-red{background:#d93025;color:white;}
.btn-green{background:#188038;color:white;}
.btn-gray{background:#9aa0a6;color:white;}

.section-title{
font-size:16px;
font-weight:500;
margin-top:16px;
}

.todo-list{
display:flex;
flex-direction:column;
gap:8px;
}

.todo-card{
background:white;
border-radius:8px;
padding:12px;
display:flex;
gap:12px;
align-items:flex-start;
border-left:6px solid transparent;
}

.cat-work{border-left-color:#1a73e8;}
.cat-home{border-left-color:#188038;}
.cat-shop{border-left-color:#f29900;}
.cat-important{border-left-color:#d93025;}

.todo-text{
flex:1;
white-space:pre-wrap;
}

.edit-textarea{
flex:1;
font-size:16px;
border:none;
border-bottom:2px solid #673ab7;
resize:none;
overflow:hidden;
}

</style>
</head>

<body>

<div class="container">

<div class="title-card">
<h1>Todoリスト</h1>
<p>ダブルタップで編集</p>
</div>

<div class="card">

<textarea
id="newTodo"
rows="1"
placeholder="Enterで改行"
></textarea>

<select id="category" class="category-select">

<option value="">カテゴリなし</option>
<option value="work">仕事</option>
<option value="home">家事</option>
<option value="shop">買い物</option>
<option value="important">重要</option>

</select>

<button class="btn-primary"
onclick="addTodo()">
追加
</button>

</div>

<select
id="filterCategory"
class="filter-select"
onchange="render()"
>

<option value="all">すべて表示</option>
<option value="work">仕事</option>
<option value="home">家事</option>
<option value="shop">買い物</option>
<option value="important">重要</option>

</select>

<div class="section-title">Todo</div>

<div id="todoList" class="todo-list"></div>

<div>

<button class="btn-red"
onclick="deleteChecked('todo')">
削除
</button>

<button class="btn-green"
onclick="completeChecked()">
完了
</button>

<button class="btn-gray"
onclick="clearChecks('todo')">
解除
</button>

</div>

<div class="section-title">完了リスト</div>

<div id="doneList" class="todo-list"></div>

</div>

<script>

let todos=[];
let dones=[];

/* 保存 */

function save(){

localStorage.setItem("todos",
JSON.stringify(todos));

localStorage.setItem("dones",
JSON.stringify(dones));

}

/* 読込 */

function load(){

todos=
JSON.parse(localStorage.getItem("todos")||"[]");

dones=
JSON.parse(localStorage.getItem("dones")||"[]");

render();

}

/* textarea自動拡張 */

const textarea=document.getElementById("newTodo");

textarea.addEventListener("input",()=>{

textarea.style.height="auto";
textarea.style.height=textarea.scrollHeight+"px";

});

/* 追加 */

function addTodo(){

if(!textarea.value.trim())return;

todos.push({
text:textarea.value,
checked:false,
category:
document.getElementById("category").value
});

textarea.value="";
textarea.style.height="auto";

save();
render();

}

/* 描画 */

function render(){

const filter=
document.getElementById("filterCategory").value;

renderList("todoList",todos,true,filter);
renderList("doneList",dones,false,filter);

}

function renderList(id,list,isTodo,filter){

const container=document.getElementById(id);

container.innerHTML="";

list
.filter(item=>{

if(filter==="all") return true;

return item.category===filter;

})
.forEach((item,index)=>{

const card=document.createElement("div");

card.className=
"todo-card cat-"+item.category;

/* checkbox */

const checkbox=document.createElement("input");

checkbox.type="checkbox";

checkbox.checked=item.checked;

checkbox.onchange=()=>{

item.checked=checkbox.checked;
save();

};

/* text */

const text=document.createElement("div");

text.className="todo-text";

text.textContent=item.text;

/* ダブルタップ編集 */

text.ondblclick=()=>{

startEdit(text,item);

};

/* スマホダブルタップ */

let tapCount=0;

text.onclick=()=>{

tapCount++;

setTimeout(()=>{

if(tapCount===2){

startEdit(text,item);

}

tapCount=0;

},250);

};

card.appendChild(checkbox);
card.appendChild(text);

container.appendChild(card);

});

}

/* 編集開始 */

function startEdit(textDiv,item){

const textarea=document.createElement("textarea");

textarea.className="edit-textarea";

textarea.value=item.text;

textDiv.replaceWith(textarea);

textarea.focus();

/* 自動拡張 */

textarea.style.height="auto";
textarea.style.height=textarea.scrollHeight+"px";

textarea.addEventListener("input",()=>{

textarea.style.height="auto";
textarea.style.height=textarea.scrollHeight+"px";

});

/* 保存 */

textarea.addEventListener("blur",()=>{

item.text=textarea.value;

save();
render();

});

}

/* 完了 */

function completeChecked(){

const remain=[];

todos.forEach(i=>{

if(i.checked){

i.checked=false;

dones.push(i);

}else{

remain.push(i);

}

});

todos=remain;

save();
render();

}

/* 削除 */

function deleteChecked(type){

if(type==="todo"){

todos=todos.filter(i=>!i.checked);

}

if(type==="done"){

dones=dones.filter(i=>!i.checked);

}

save();
render();

}

/* チェック解除 */

function clearChecks(type){

let list=
type==="todo"?todos:dones;

list.forEach(i=>i.checked=false);

save();

}

load();

</script>

</body>
</html>
