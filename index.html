<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Todoリスト</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #f0ebf8;
    font-family: 'Roboto', Arial, sans-serif;
    font-size: 16px;
}

.container {
    max-width: 640px;
    margin: 0 auto;
    padding: 12px;
}

/* タイトル */

.title-card {
    background: white;
    border-top: 8px solid #673ab7;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 8px;
}

.title-card h1 {
    font-size: 22px;
    margin: 0;
}

.title-card p {
    font-size: 14px;
    color: #5f6368;
}

/* 入力 */

.card {
    background: white;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 8px;
}

textarea {
    width: 100%;
    font-size: 16px;
    border: none;
    border-bottom: 1px solid #dadce0;
}

textarea:focus {
    outline: none;
    border-bottom: 2px solid #673ab7;
}

/* ボタン */

button {
    height: 44px;
    padding: 0 18px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
    margin-top: 8px;
}

.btn-primary { background:#673ab7;color:white; }
.btn-red { background:#d93025;color:white; }
.btn-green { background:#188038;color:white; }
.btn-gray { background:#9aa0a6;color:white; }

/* セクション */

.section-title {
    font-size: 16px;
    font-weight: 500;
    margin-top: 16px;
}

/* Todo */

.todo-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.todo-card {
    background: white;
    border-radius: 8px;
    border: 1px solid #dadce0;
    padding: 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: 0.15s;
    position: relative;
}

.todo-card.checked {
    border-color: #673ab7;
    background: #f3e8ff;
}

/* スワイプ背景 */

.swipe-bg {
    position: absolute;
    inset: 0;
    border-radius: 8px;
    z-index: 0;
}

.swipe-left {
    background: #d93025;
}

.swipe-right {
    background: #188038;
}

.todo-content {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 12px;
    width: 100%;
}

input[type="checkbox"] {
    width: 22px;
    height: 22px;
}

.todo-text {
    flex: 1;
    white-space: pre-wrap;
}

</style>
</head>

<body>

<div class="container">

<div class="title-card">
<h1>Todoリスト</h1>
<p>右スワイプ＝完了 / 左スワイプ＝削除</p>
</div>

<div class="card">

<textarea
id="newTodo"
rows="2"
placeholder="Enterで改行"
></textarea>

<button
class="btn-primary"
onclick="addTodo()"
>
追加
</button>

</div>

<div class="section-title">Todo</div>

<div id="todoList" class="todo-list"></div>

<div>

<button class="btn-red"
onclick="deleteChecked('todo')">
削除
</button>

<button class="btn-green"
onclick="completeChecked()">
完了
</button>

<button class="btn-gray"
onclick="clearChecks('todo')">
解除
</button>

</div>

<div class="section-title">完了リスト</div>

<div id="doneList" class="todo-list"></div>

<div>

<button class="btn-red"
onclick="deleteChecked('done')">
削除
</button>

<button class="btn-gray"
onclick="clearChecks('done')">
解除
</button>

</div>

</div>

<script>

let todos=[];
let dones=[];

function save(){
localStorage.setItem("todos",JSON.stringify(todos));
localStorage.setItem("dones",JSON.stringify(dones));
}

function load(){
todos=JSON.parse(localStorage.getItem("todos")||"[]");
dones=JSON.parse(localStorage.getItem("dones")||"[]");
render();
}

function addTodo(){

const t=document.getElementById("newTodo");

if(!t.value.trim())return;

todos.push({
text:t.value,
checked:false
});

t.value="";

save();
render();
}

/* Ctrl + Enter で追加 */

document.getElementById("newTodo")
.addEventListener("keydown", e => {

    if (e.key === "Enter" && e.ctrlKey) {

        e.preventDefault();

        addTodo();

    }

});

function render(){

renderList("todoList",todos,true);
renderList("doneList",dones,false);

}

function renderList(id,list,isTodo){

const container=document.getElementById(id);

container.innerHTML="";

list.forEach((item,index)=>{

const card=document.createElement("div");
card.className="todo-card";

const content=document.createElement("div");
content.className="todo-content";

/* checkbox */

const checkbox=document.createElement("input");

checkbox.type="checkbox";
checkbox.checked=item.checked;

checkbox.onchange=()=>{
item.checked=checkbox.checked;
save();
render();
};

/* text */

const text=document.createElement("div");

text.className="todo-text";
text.textContent=item.text;

content.appendChild(checkbox);
content.appendChild(text);

card.appendChild(content);

container.appendChild(card);

/* スワイプ */

let startX=0;

card.addEventListener("touchstart",e=>{

startX=e.touches[0].clientX;

});

card.addEventListener("touchmove",e=>{

const dx=e.touches[0].clientX-startX;

card.style.transform=
`translateX(${dx}px)`;

});

card.addEventListener("touchend",e=>{

const dx=e.changedTouches[0].clientX-startX;

/* 右スワイプ */

if(dx>80 && isTodo){

item.checked=true;
completeChecked();

}

/* 左スワイプ */

else if(dx<-80){

list.splice(index,1);

save();
render();

}

card.style.transform="";

});

});

}

function deleteChecked(type){

if(type==="todo"){

todos=todos.filter(i=>!i.checked);

}

if(type==="done"){

dones=dones.filter(i=>!i.checked);

}

save();
render();

}

function completeChecked(){

const remain=[];

todos.forEach(i=>{

if(i.checked){

i.checked=false;
dones.push(i);

}else{

remain.push(i);

}

});

todos=remain;

save();
render();

}

function clearChecks(type){

let list=
type==="todo"?todos:dones;

list.forEach(i=>i.checked=false);

save();
render();

}

load();

</script>

</body>
</html>
