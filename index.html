<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Todoリスト Pro+ CSV連携版</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" id="theme-meta" content="#673ab7">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
:root {
    --bg-color: #f0ebf8;
    --card-bg: white;
    --text-color: #333;
    --sub-text: #666;
    --border-color: #dadce0;
    --primary-color: #673ab7;
}

body.dark-mode {
    --bg-color: #121212;
    --card-bg: #1e1e1e;
    --text-color: #e0e0e0;
    --sub-text: #aaa;
    --border-color: #333;
    --primary-color: #bb86fc;
}

body { margin:0; background: var(--bg-color); font-family:'Roboto',sans-serif; font-size:16px; color: var(--text-color); transition: 0.3s; padding-bottom: 50px; }
.container { max-width:640px; margin:0 auto; padding:12px; }

.title-card { background: var(--card-bg); border-top:8px solid var(--primary-color); border-radius:8px; padding:16px; margin-bottom:12px; display: flex; justify-content: space-between; align-items: center; }
.title-card h1 { margin:0; font-size:22px; }

.section-card { background: var(--card-bg); border-radius:8px; padding:16px; margin-bottom:12px; box-shadow:0 1px 2px rgba(0,0,0,0.1); }
.section-header { font-size:18px; font-weight:500; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.section-divider { height:1px; background: var(--border-color); margin-bottom:12px; }

textarea, input[type="text"], input[type="date"], select { 
    width:100%; font-size:16px; border:none; border-bottom:1px solid var(--border-color); outline: none; box-sizing: border-box; background:transparent; color: var(--text-color);
}
textarea:focus, input:focus, select:focus { border-bottom:2px solid var(--primary-color); }
textarea { resize:none; overflow:hidden; min-height:44px; display: block; margin-bottom: 8px; }

button { height:44px; padding:0 18px; font-size:15px; border-radius:6px; border:none; margin-top:10px; cursor: pointer; white-space: nowrap; }
.btn-primary {background: var(--primary-color); color:white;}
.btn-red {background:#d93025;color:white;}
.btn-green {background:#188038;color:white;}
.btn-blue {background:#1a73e8;color:white;}
.btn-gray {background:#9aa0a6;color:white;}

.btn-sm { 
    height: 36px; 
    padding: 0 12px; 
    margin-top: 0; 
    font-size: 14px; 
    min-width: 44px; 
}

.invisible { visibility: hidden; pointer-events: none; }

.category-item { display:flex; gap:8px; margin-bottom:12px; align-items:center; }
.category-item input { flex:1; font-size: 15px; }
.category-controls { display: flex; align-items: center; gap: 4px; }
.btn-delete-cat { margin-left: 12px; background: #eee; color: #666; border-radius: 50%; width: 32px; height: 32px; padding: 0; min-width: 32px; font-weight: bold; }
body.dark-mode .btn-delete-cat { background: #333; color: #aaa; }

.todo-list { display:flex; flex-direction:column; gap:8px; }
.todo-card { background: var(--card-bg); border-radius:8px; padding:12px; display:flex; gap:12px; align-items:flex-start; border-left:6px solid #ccc; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
.todo-text { flex:1; white-space:pre-wrap; word-break: break-all; }
.todo-main-text { font-weight: 500; display: block; margin-bottom: 4px; }
.todo-memo-text { font-size: 13px; color: var(--sub-text); display: block; border-top: 1px solid var(--border-color); padding-top: 4px; margin-top: 4px; }

.star { color: #f29900; font-size: 18px; margin-right: 4px; }
.info-row { display: flex; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
.cat-label { font-size: 11px; color: #666; font-weight: 500; background: #eee; padding: 2px 6px; border-radius: 4px; }

.edit-container { flex: 1; display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 4px; }
</style>
</head>
<body>

<div class="container">
    <div class="title-card">
        <h1>Todo Pro+</h1>
        <button class="btn-sm btn-gray" onclick="toggleDarkMode()">🌙 Mode</button>
    </div>

    <div class="section-card">
        <div class="section-header">新しいTodo</div>
        <textarea id="newTodo" rows="1" placeholder="タスク名を入力..."></textarea>
        <textarea id="newMemo" style="font-size:14px; border-bottom-style:dashed;" rows="1" placeholder="詳細メモ（任意）..."></textarea>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <select id="categorySelect" style="flex: 2; min-width: 120px;"></select>
            <input type="date" id="deadlineInput" style="flex: 2; min-width: 120px;">
            <label style="flex: 1; display: flex; align-items: center; font-size: 14px; gap: 4px; min-width: 80px; cursor:pointer;">
                <input type="checkbox" id="isImportant"> ⭐重要
            </label>
        </div>
        <button class="btn-primary" onclick="addTodo()">追加</button>
    </div>

    <div class="section-card">
        <div class="section-header">検索とフィルタ</div>
        <input type="text" id="searchInput" placeholder="🔍 キーワードで検索..." oninput="render()" style="margin-bottom: 12px;">
        <select id="filterCategory" onchange="render()"></select>
    </div>

    <div class="section-card">
        <div class="section-header">Todo
            <label style="font-size: 13px; font-weight: normal; cursor: pointer;">
                <input type="checkbox" id="todoSelectAll" onchange="toggleAll('todo', this.checked)"> 全選択
            </label>
        </div>
        <div class="section-divider"></div>
        <div id="todoList" class="todo-list"></div>
        <div style="display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;">
            <button class="btn-red" onclick="deleteChecked('todo')">削除</button>
            <button class="btn-green" onclick="completeChecked()">完了</button>
        </div>
    </div>

    <div class="section-card">
        <div class="section-header">完了済み
            <label style="font-size: 13px; font-weight: normal; cursor: pointer;">
                <input type="checkbox" id="doneSelectAll" onchange="toggleAll('done', this.checked)"> 全選択
            </label>
        </div>
        <div class="section-divider"></div>
        <div id="doneList" class="todo-list"></div>
        <div style="display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;">
            <button class="btn-red" onclick="deleteChecked('done')">削除</button>
            <button class="btn-blue" onclick="restoreChecked()">Todoに戻す</button>
        </div>
    </div>

    <div class="section-card">
        <div class="section-header">カテゴリ設定</div>
        <div class="section-divider"></div>
        <div style="margin-bottom: 20px; display: flex; gap: 8px; align-items: flex-end; background: rgba(0,0,0,0.02); padding: 10px; border-radius: 6px;">
            <input type="text" id="newCategoryName" placeholder="新規カテゴリ名を入力...">
            <button class="btn-primary btn-sm" style="min-width:70px;" onclick="addCategory()">追加</button>
        </div>
        <div id="categoryManager"></div>
    </div>

    <div class="section-card" style="margin-top: 24px; border-top: 1px dashed var(--border-color); background: transparent; box-shadow: none;">
        <div class="section-header" style="font-size: 14px; opacity: 0.7;">バックアップと復元</div>
        
        <p style="font-size: 12px; color: var(--sub-text); margin-bottom: 8px;">
            ※スプレッドシートで一括編集したい場合は「CSV」を使用してください。
        </p>
        
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <button class="btn-green btn-sm" onclick="exportCSV()">CSVを保存(スプレッドシート用)</button>
            <button class="btn-green btn-sm" onclick="document.getElementById('importCSVFile').click()">CSVから復元</button>
            <input type="file" id="importCSVFile" style="display:none" accept=".csv" onchange="importCSV(event)">
            
            <button class="btn-gray btn-sm" onclick="exportData()">全データ保存(JSON)</button>
            <button class="btn-gray btn-sm" onclick="document.getElementById('importFile').click()">JSONから復元</button>
            <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
        </div>
    </div>
</div>

<script>
let todos = [];
let dones = [];
let categories = [];
const COLORS = ['#1a73e8', '#188038', '#f29900', '#d93025', '#673ab7', '#00acc1', '#e91e63'];

function init() {
    todos = JSON.parse(localStorage.getItem("todos") || "[]");
    dones = JSON.parse(localStorage.getItem("dones") || "[]");
    categories = JSON.parse(localStorage.getItem("categories") || '["仕事", "家事", "買い物"]');
    if (localStorage.getItem("darkMode") === "enabled") document.body.classList.add("dark-mode");
    updateSelectOptions();
    renderCategoryManager();
    render();
}

function save() {
    localStorage.setItem("todos", JSON.stringify(todos));
    localStorage.setItem("dones", JSON.stringify(dones));
    localStorage.setItem("categories", JSON.stringify(categories));
}

function toggleDarkMode() {
    const isDark = document.body.classList.toggle("dark-mode");
    localStorage.setItem("darkMode", isDark ? "enabled" : "disabled");
}

function addTodo() {
    const textEl = document.getElementById("newTodo");
    const memoEl = document.getElementById("newMemo");
    const starEl = document.getElementById("isImportant");
    if (!textEl.value.trim()) return;
    todos.push({
        text: textEl.value,
        memo: memoEl.value,
        important: starEl.checked,
        checked: false,
        category: document.getElementById("categorySelect").value,
        deadline: document.getElementById("deadlineInput").value
    });
    textEl.value = ""; memoEl.value = ""; starEl.checked = false;
    save(); render();
}

function render() {
    const filter = document.getElementById("filterCategory").value;
    const search = document.getElementById("searchInput").value.toLowerCase();
    const filterFunc = (item) => {
        const matchCat = (filter === "all" || item.category === filter);
        const matchSearch = (item.text.toLowerCase().includes(search) || (item.memo && item.memo.toLowerCase().includes(search)));
        return matchCat && matchSearch;
    };
    renderList("todoList", todos.filter(filterFunc), "todoSelectAll");
    renderList("doneList", dones.filter(filterFunc), "doneSelectAll");
}

function renderList(id, filteredList, selectAllId) {
    const container = document.getElementById(id);
    container.innerHTML = "";
    const today = new Date().toISOString().split('T')[0];

    filteredList.sort((a, b) => {
        if (a.important !== b.important) return b.important - a.important;
        if (!a.deadline && b.deadline) return 1;
        if (a.deadline && !b.deadline) return -1;
        return (a.deadline || "").localeCompare(b.deadline || "");
    });

    document.getElementById(selectAllId).checked = filteredList.length > 0 && filteredList.every(item => item.checked);

    filteredList.forEach(item => {
        const card = document.createElement("div");
        card.className = "todo-card";
        if (item.category) {
            const idx = categories.indexOf(item.category) % COLORS.length;
            card.style.borderLeftColor = COLORS[idx] || '#ccc';
        }
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox"; checkbox.checked = item.checked;
        checkbox.onchange = () => { item.checked = checkbox.checked; save(); render(); };
        const content = document.createElement("div");
        content.className = "todo-text";
        let infoHtml = `<div class="info-row">`;
        if (item.category) infoHtml += `<span class="cat-label">${item.category}</span>`;
        if (item.deadline) {
            const isOverdue = item.deadline < today && id === "todoList";
            infoHtml += `<span style="font-size:11px; ${isOverdue ? 'color:red; font-weight:bold;' : ''}">📅 ${item.deadline}</span>`;
        }
        infoHtml += `</div>`;
        let starHtml = item.important ? `<span class="star">⭐</span>` : "";
        let memoHtml = item.memo ? `<span class="todo-memo-text">${item.memo.replace(/\n/g, '<br>')}</span>` : "";
        content.innerHTML = infoHtml + `<span class="todo-main-text">${starHtml}${item.text}</span>` + memoHtml;
        card.appendChild(checkbox);
        card.appendChild(content);
        container.appendChild(card);
    });
}

// --- カテゴリ管理 ---
function renderCategoryManager() {
    const container = document.getElementById("categoryManager");
    container.innerHTML = "";
    categories.forEach((cat, index) => {
        const div = document.createElement("div");
        div.className = "category-item";
        const upBtnClass = (index === 0) ? "btn-gray btn-sm invisible" : "btn-gray btn-sm";
        const downBtnClass = (index === categories.length - 1) ? "btn-gray btn-sm invisible" : "btn-gray btn-sm";
        div.innerHTML = `
            <input type="text" value="${cat}" onchange="editCategory(${index}, this.value)">
            <div class="category-controls">
                <button class="${upBtnClass}" onclick="moveCategory(${index}, -1)">↑</button>
                <button class="${downBtnClass}" onclick="moveCategory(${index}, 1)">↓</button>
                <button class="btn-delete-cat" onclick="deleteCategory(${index})" title="削除">×</button>
            </div>
        `;
        container.appendChild(div);
    });
}

function moveCategory(index, direction) {
    const targetIndex = index + direction;
    if (targetIndex < 0 || targetIndex >= categories.length) return;
    const temp = categories[index];
    categories[index] = categories[targetIndex];
    categories[targetIndex] = temp;
    save(); updateSelectOptions(); renderCategoryManager(); render();
}

function addCategory() {
    const input = document.getElementById("newCategoryName");
    const newName = input.value.trim();
    if (newName) { categories.unshift(newName); input.value = ""; save(); updateSelectOptions(); renderCategoryManager(); render(); }
}

function editCategory(index, newName) {
    const oldName = categories[index];
    if (!newName.trim()) return;
    [todos, dones].forEach(list => list.forEach(t => { if(t.category === oldName) t.category = newName; }));
    categories[index] = newName; save(); updateSelectOptions(); render();
}

function deleteCategory(index) {
    if (confirm(`カテゴリ「${categories[index]}」を削除しますか？`)) {
        const name = categories[index];
        [todos, dones].forEach(list => list.forEach(t => { if(t.category === name) t.category = ""; }));
        categories.splice(index, 1); save(); updateSelectOptions(); renderCategoryManager(); render();
    }
}

function updateSelectOptions() {
    const selects = [document.getElementById("categorySelect"), document.getElementById("filterCategory")];
    let opts = `<option value="">カテゴリなし</option>`;
    categories.forEach(c => opts += `<option value="${c}">${c}</option>`);
    selects[0].innerHTML = opts;
    selects[1].innerHTML = `<option value="all">すべて表示</option>` + opts;
}

// --- CSV連携機能 ---

function exportCSV() {
    // ヘッダー
    let csvContent = "状態,タイトル,メモ,カテゴリ,期限,重要度(1=重要)\n";
    
    const allData = [
        ...todos.map(t => ({...t, status: "未完了"})),
        ...dones.map(t => ({...t, status: "完了済み"}))
    ];
    
    allData.forEach(item => {
        // カンマや改行が含まれる場合に備えてダブルクォーテーションで囲む
        const row = [
            item.status,
            `"${item.text.replace(/"/g, '""')}"`,
            `"${(item.memo || "").replace(/"/g, '""')}"`,
            `"${(item.category || "").replace(/"/g, '""')}"`,
            item.deadline || "",
            item.important ? "1" : "0"
        ].join(",");
        csvContent += row + "\n";
    });

    const bom = new Uint8Array([0xEF, 0xBB, 0xBF]); // Excelの文字化け防止
    const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = "todo_list.csv"; a.click();
}

function importCSV(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const content = e.target.result;
        const lines = content.split("\n");
        const newTodos = [];
        const newDones = [];
        
        // 1行目はヘッダーなのでスキップ
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            
            // シンプルなカンマ分割（高度なクォート処理を簡易化）
            const parts = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            if (!parts || parts.length < 2) continue;

            const clean = (str) => (str || "").replace(/^"|"$/g, '').replace(/""/g, '"');
            
            const item = {
                text: clean(parts[1]),
                memo: clean(parts[2]),
                category: clean(parts[3]),
                deadline: clean(parts[4]),
                important: clean(parts[5]) === "1",
                checked: false
            };
            
            if (clean(parts[0]) === "完了済み") newDones.push(item);
            else newTodos.push(item);
        }
        
        if (confirm("既存のTodoを上書きしてCSVデータを復元しますか？")) {
            todos = newTodos; dones = newDones; save(); render();
            alert("CSVからデータを復元しました。");
        }
    };
    reader.readAsText(file);
}

// --- JSONバックアップ（カテゴリ等を含む完全バックアップ用） ---
function exportData() {
    const data = { todos, dones, categories };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = `todo-pro-full.json`; a.click();
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            todos = data.todos || []; dones = data.dones || []; categories = data.categories || [];
            save(); updateSelectOptions(); renderCategoryManager(); render();
            alert("JSONから復元しました。");
        } catch (err) { alert("形式が不正です。"); }
    };
    reader.readAsText(file);
}

function toggleAll(type, isChecked) {
    let list = (type === 'todo') ? todos : dones;
    list.forEach(item => item.checked = isChecked);
    save(); render();
}

function completeChecked() {
    const remain = [];
    todos.forEach(i => { if (i.checked) { i.checked = false; dones.push(i); } else remain.push(i); });
    todos = remain; save(); render();
}

function restoreChecked() {
    const remain = [];
    dones.forEach(i => { if (i.checked) { i.checked = false; todos.push(i); } else remain.push(i); });
    dones = remain; save(); render();
}

function deleteChecked(type) {
    if (type === "todo") todos = todos.filter(i => !i.checked);
    else dones = dones.filter(i => !i.checked);
    save(); render();
}

init();
</script>
</body>
</html>
