<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Todoリスト</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>

/* ===== 全体 ===== */

body {
    margin: 0;
    background: #f0ebf8;
    font-family: 'Roboto', Arial, sans-serif;
    font-size: 16px;
}

/* ===== レイアウト ===== */

.container {
    max-width: 640px;
    margin: 0 auto;
    padding: 12px;
}

/* ===== タイトル ===== */

.title-card {
    background: white;
    border-top: 8px solid #673ab7;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 8px;
}

.title-card h1 {
    font-size: 22px;
    margin: 0;
}

.title-card p {
    font-size: 14px;
    color: #5f6368;
}

/* ===== 入力 ===== */

.card {
    background: white;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 8px;
}

/* ===== textarea（自動拡張対応） ===== */

textarea {
    width: 100%;
    font-size: 16px;
    border: none;
    border-bottom: 1px solid #dadce0;
    resize: none;
    overflow: hidden;
    min-height: 48px;
}

textarea:focus {
    outline: none;
    border-bottom: 2px solid #673ab7;
}

/* ===== ボタン ===== */

button {
    height: 44px;
    padding: 0 18px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
    margin-top: 8px;
}

.btn-primary { background:#673ab7;color:white; }
.btn-red { background:#d93025;color:white; }
.btn-green { background:#188038;color:white; }
.btn-gray { background:#9aa0a6;color:white; }

/* ===== セクション ===== */

.section-title {
    font-size: 16px;
    font-weight: 500;
    margin-top: 16px;
}

/* ===== Todo ===== */

.todo-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.todo-card {
    background: white;
    border-radius: 8px;
    border: 1px solid #dadce0;
    padding: 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
}

.todo-card.checked {
    border-color: #673ab7;
    background: #f3e8ff;
}

input[type="checkbox"] {
    width: 22px;
    height: 22px;
}

.todo-text {
    flex: 1;
    white-space: pre-wrap;
}

</style>
</head>

<body>

<div class="container">

<div class="title-card">
<h1>Todoリスト</h1>
</div>

<div class="card">

<textarea
id="newTodo"
rows="1"
placeholder=""
></textarea>

<button
class="btn-primary"
onclick="addTodo()"
>
追加
</button>

</div>

<div class="section-title">Todo</div>

<div id="todoList" class="todo-list"></div>

<div>

<button class="btn-red"
onclick="deleteChecked('todo')">
削除
</button>

<button class="btn-green"
onclick="completeChecked()">
完了
</button>

<button class="btn-gray"
onclick="clearChecks('todo')">
解除
</button>

</div>

<div class="section-title">完了リスト</div>

<div id="doneList" class="todo-list"></div>

<div>

<button class="btn-red"
onclick="deleteChecked('done')">
削除
</button>

<button class="btn-gray"
onclick="clearChecks('done')">
解除
</button>

</div>

</div>

<script>

/* ===== データ ===== */

let todos=[];
let dones=[];

/* ===== 保存 ===== */

function save(){

localStorage.setItem("todos",
JSON.stringify(todos));

localStorage.setItem("dones",
JSON.stringify(dones));

}

/* ===== 読込 ===== */

function load(){

todos=
JSON.parse(localStorage.getItem("todos")||"[]");

dones=
JSON.parse(localStorage.getItem("dones")||"[]");

render();

}

/* ===== textarea自動拡張 ===== */

function autoResizeTextarea(){

const textarea=
document.getElementById("newTodo");

textarea.style.height="auto";

textarea.style.height=
textarea.scrollHeight+"px";

}

/* 入力時に高さ調整 */

document
.getElementById("newTodo")
.addEventListener("input",()=>{

autoResizeTextarea();

});

/* Ctrl+Enterで追加 */

document
.getElementById("newTodo")
.addEventListener("keydown",e=>{

if(e.key==="Enter" && e.ctrlKey){

e.preventDefault();

addTodo();

}

});

/* ===== 追加 ===== */

function addTodo(){

const textarea=
document.getElementById("newTodo");

const text=textarea.value;

if(!text.trim())return;

todos.push({
text:text,
checked:false
});

textarea.value="";

/* 高さリセット */

textarea.style.height="auto";

save();
render();

}

/* ===== 描画 ===== */

function render(){

renderList("todoList",todos);
renderList("doneList",dones);

}

function renderList(id,list){

const container=
document.getElementById(id);

container.innerHTML="";

list.forEach(item=>{

const card=
document.createElement("div");

card.className=
"todo-card"+
(item.checked?" checked":"");

/* checkbox */

const checkbox=
document.createElement("input");

checkbox.type="checkbox";

checkbox.checked=item.checked;

checkbox.onchange=()=>{

item.checked=checkbox.checked;

save();
render();

};

/* text */

const text=
document.createElement("div");

text.className="todo-text";

text.textContent=item.text;

card.appendChild(checkbox);
card.appendChild(text);

container.appendChild(card);

});

}

/* ===== 操作 ===== */

function deleteChecked(type){

if(type==="todo"){

todos=
todos.filter(i=>!i.checked);

}

if(type==="done"){

dones=
dones.filter(i=>!i.checked);

}

save();
render();

}

function completeChecked(){

const remain=[];

todos.forEach(i=>{

if(i.checked){

i.checked=false;

dones.push(i);

}else{

remain.push(i);

}

});

todos=remain;

save();
render();

}

function clearChecks(type){

let list=
type==="todo"?todos:dones;

list.forEach(i=>i.checked=false);

save();
render();

}

/* ===== 起動 ===== */

load();

</script>

</body>
</html>
